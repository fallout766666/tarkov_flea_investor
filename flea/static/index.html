<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tarkov-flea-investor</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --border: #242a36;
    --text: #d8dde6;
    --muted: #8892a6;
    --accent: #f0b429;
    --up: #4ade80;
    --down: #f87171;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 16px; color: var(--accent); }
  .status { color: var(--muted); font-size: 12px; }
  .status.stale { color: var(--warn); }
  input, button, select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font: inherit;
  }
  input:focus, select:focus { outline: 1px solid var(--accent); }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  nav { display: flex; gap: 4px; padding: 0 20px; background: var(--panel); border-bottom: 1px solid var(--border); }
  nav button {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    padding: 10px 16px;
    color: var(--muted);
  }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  main { padding: 20px; }
  .tab { display: none; }
  .tab.active { display: block; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  tr:hover td { background: var(--panel); }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .dir-up   { color: var(--up); }
  .dir-down { color: var(--down); }
  .dir-unclear { color: var(--muted); }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    background: var(--bg); border: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
  .event { padding: 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; background: var(--panel); }
  .event-head { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
  .event-summary { margin: 4px 0; }
  .event-meta { color: var(--muted); font-size: 12px; }
  .event-meta a { color: var(--muted); }
  #chart { max-width: 100%; }
  .reasoning { color: var(--muted); font-size: 12px; }
  .config-hint { color: var(--muted); margin-top: 20px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>tarkov-flea-investor</h1>
  <div>
    <input id="apikey" type="password" placeholder="X-API-Key" style="width: 280px;" />
    <button id="save-key">save</button>
  </div>
  <div id="health" class="status">checking...</div>
</header>
<nav>
  <button data-tab="signals" class="active">signals</button>
  <button data-tab="events">events</button>
  <button data-tab="history">item history</button>
</nav>
<main>
  <section id="signals" class="tab active">
    <div class="controls">
      <select id="signal-type">
        <option value="">all types</option>
        <option value="vendor_flip">vendor_flip</option>
        <option value="dip_buy">dip_buy</option>
        <option value="crash">crash</option>
      </select>
      <button id="refresh-signals">refresh</button>
      <span id="signals-meta" class="status"></span>
    </div>
    <table id="signals-table">
      <thead>
        <tr>
          <th>item</th>
          <th>type</th>
          <th>action</th>
          <th class="num">score</th>
          <th>reasoning</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="empty" id="signals-empty" hidden>no signals yet — run <code>flea watch</code></div>
  </section>

  <section id="events" class="tab">
    <div class="controls">
      <label>min confidence
        <input id="event-conf" type="number" min="0" max="1" step="0.05" value="0" style="width: 80px;" />
      </label>
      <button id="refresh-events">refresh</button>
    </div>
    <div id="events-list"></div>
    <div class="empty" id="events-empty" hidden>no events yet</div>
  </section>

  <section id="history" class="tab">
    <div class="controls">
      <input id="item-search" type="text" placeholder="search item (e.g. LEDX, G28)" style="width: 280px;" />
      <select id="history-window">
        <option value="24h">24h</option>
        <option value="7d" selected>7d</option>
        <option value="30d">30d</option>
      </select>
      <span id="history-meta" class="status"></span>
    </div>
    <div id="item-results" class="controls"></div>
    <canvas id="chart" height="120"></canvas>
    <div class="empty" id="history-empty">search an item to view price history</div>
  </section>

  <div class="config-hint">
    API key persists in localStorage on this device. Set the same value as <code>FLEA_API_KEY</code> in <code>.env</code>.
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const fmt = (n) => n == null ? "-" : n.toLocaleString();
const apiKey = () => localStorage.getItem("flea-api-key") || "";

async function api(path) {
  const r = await fetch(path, { headers: apiKey() ? { "X-API-Key": apiKey() } : {} });
  if (!r.ok) {
    const text = await r.text();
    throw new Error(`${r.status}: ${text}`);
  }
  return r.json();
}

function setTab(name) {
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b.dataset.tab === name));
  document.querySelectorAll(".tab").forEach(s => s.classList.toggle("active", s.id === name));
}
document.querySelectorAll("nav button").forEach(b => b.addEventListener("click", () => setTab(b.dataset.tab)));

// api key
const keyInput = document.getElementById("apikey");
keyInput.value = apiKey();
document.getElementById("save-key").addEventListener("click", () => {
  localStorage.setItem("flea-api-key", keyInput.value);
  refreshAll();
});

// health
async function loadHealth() {
  try {
    const h = await api("/health");
    const el = document.getElementById("health");
    const stale = h.price_stale_seconds == null || h.price_stale_seconds > 600;
    const newsStale = h.news_stale_seconds == null || h.news_stale_seconds > 3600;
    el.classList.toggle("stale", stale || newsStale);
    el.textContent = `price ${h.price_stale_seconds ?? "—"}s ago · news ${h.news_stale_seconds ?? "—"}s ago`;
  } catch (e) {
    document.getElementById("health").textContent = `health error: ${e.message}`;
  }
}

// signals
async function loadSignals() {
  const type = document.getElementById("signal-type").value;
  const tbody = document.querySelector("#signals-table tbody");
  const empty = document.getElementById("signals-empty");
  tbody.innerHTML = "";
  try {
    const q = type ? `?type=${type}&limit=100` : "?limit=100";
    const data = await api("/signals" + q);
    document.getElementById("signals-meta").textContent =
      data.latest_emit ? `emitted ${new Date(data.latest_emit * 1000).toLocaleString()}` : "";
    if (!data.signals.length) {
      empty.hidden = false;
      return;
    }
    empty.hidden = true;
    for (const s of data.signals) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${s.short_name || s.name}<div class="reasoning">${s.name}</div></td>
        <td><span class="pill">${s.signal_type}</span></td>
        <td>${s.action}</td>
        <td class="num">${fmt(Math.round(s.score))}</td>
        <td class="reasoning">${s.reasoning}</td>`;
      tbody.appendChild(tr);
    }
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty">${e.message}</td></tr>`;
  }
}
document.getElementById("refresh-signals").addEventListener("click", loadSignals);
document.getElementById("signal-type").addEventListener("change", loadSignals);

// events
async function loadEvents() {
  const conf = document.getElementById("event-conf").value || 0;
  const list = document.getElementById("events-list");
  const empty = document.getElementById("events-empty");
  list.innerHTML = "";
  try {
    const data = await api(`/events?min_confidence=${conf}&limit=100`);
    if (!data.events.length) {
      empty.hidden = false;
      return;
    }
    empty.hidden = true;
    for (const e of data.events) {
      const items = (e.items || []).map(it => it.short_name || it.name).join(", ") || "—";
      const div = document.createElement("div");
      div.className = "event";
      div.innerHTML = `
        <div class="event-head">
          <span class="pill">${e.event_type}</span>
          <span class="dir-${e.direction}">${e.direction}</span>
          <span class="pill">conf ${e.confidence.toFixed(2)}</span>
          <span class="pill">${e.time_horizon}</span>
          <span class="event-meta">items: ${items}</span>
        </div>
        <div class="event-summary">${e.summary}</div>
        <div class="event-meta">
          ${e.article_source ? `${e.article_source} · ` : ""}
          ${e.article_url ? `<a href="${e.article_url}" target="_blank" rel="noreferrer">${e.article_title || e.article_url}</a>` : ""}
        </div>`;
      list.appendChild(div);
    }
  } catch (err) {
    list.innerHTML = `<div class="empty">${err.message}</div>`;
  }
}
document.getElementById("refresh-events").addEventListener("click", loadEvents);
document.getElementById("event-conf").addEventListener("change", loadEvents);

// history
let chart = null;
let searchTimer = null;
document.getElementById("item-search").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => searchItems(e.target.value), 250);
});
document.getElementById("history-window").addEventListener("change", () => {
  const active = document.querySelector("#item-results button.active");
  if (active) loadHistory(active.dataset.id, active.dataset.name);
});

async function searchItems(q) {
  const out = document.getElementById("item-results");
  out.innerHTML = "";
  if (!q || q.length < 2) return;
  try {
    const data = await api(`/items?q=${encodeURIComponent(q)}&limit=8`);
    for (const it of data.items) {
      const b = document.createElement("button");
      b.textContent = it.short_name ? `${it.short_name} (${it.name})` : it.name;
      b.dataset.id = it.id;
      b.dataset.name = it.short_name || it.name;
      b.addEventListener("click", () => {
        out.querySelectorAll("button").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        loadHistory(it.id, b.dataset.name);
      });
      out.appendChild(b);
    }
  } catch (e) {
    out.innerHTML = `<span class="empty">${e.message}</span>`;
  }
}

async function loadHistory(id, label) {
  const window = document.getElementById("history-window").value;
  const empty = document.getElementById("history-empty");
  const meta = document.getElementById("history-meta");
  try {
    const data = await api(`/items/${id}/history?window=${window}`);
    if (!data.snapshots.length) {
      empty.hidden = false;
      empty.textContent = "no snapshots in this window yet";
      if (chart) { chart.destroy(); chart = null; }
      return;
    }
    empty.hidden = true;
    meta.textContent = `${label} · base ${fmt(data.item.base_price)} · ${data.snapshots.length} snapshots`;
    const labels = data.snapshots.map(s => new Date(s.captured_at * 1000).toLocaleString());
    const low = data.snapshots.map(s => s.last_low_price);
    const avg = data.snapshots.map(s => s.avg_24h_price);
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "last low",  data: low, borderColor: "#f0b429", tension: 0.1 },
          { label: "24h avg",   data: avg, borderColor: "#60a5fa", tension: 0.1 },
        ],
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#d8dde6" } } },
        scales: {
          x: { ticks: { color: "#8892a6" }, grid: { color: "#242a36" } },
          y: { ticks: { color: "#8892a6" }, grid: { color: "#242a36" } },
        },
      },
    });
  } catch (e) {
    empty.hidden = false;
    empty.textContent = e.message;
  }
}

function refreshAll() {
  loadHealth();
  loadSignals();
  loadEvents();
}
refreshAll();
setInterval(loadHealth, 30000);
</script>
</body>
</html>
